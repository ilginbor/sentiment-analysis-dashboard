services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sentiment_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "SqlServer2026!"
      MSSQL_SA_PASSWORD: "SqlServer2026!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data: